project:
  name: forex-signal-pipeline
  version: 1.0.0

data:
  pairs:
    - EURUSD=X
  interval: 1d
  period_years: 5
  raw_path: data/raw
  processed_path: data/processed
  features_path: data/features

features:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  atr_period: 14
  sma_periods: [10, 20, 50]
  prediction_horizon: 5

models:
  prophet:
    n_trials: 20
  lstm:
    n_trials: 10
    sequence_length: 20
    units: [32, 16]
    dropout: 0.2
    epochs: 18
    batch_size: 32
  sklearn:
    n_trials: 20
  ensemble:
    n_weight_trials: 20

backtesting:
  train_months: 24
  test_months: 3
  sharpe_threshold: 1.0
  risk_free_rate: 0.05

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment_name: forex-signal-pipeline
  model_registry:
    EURUSD: forex-ensemble-EURUSD

serving:
  host: 0.0.0.0
  port: 8000

dashboard:
  port: 8501
