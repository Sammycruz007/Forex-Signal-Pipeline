version: '3.8'

services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: forex-api
    ports:
      - '8000:8000'
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    container_name: forex-mlflow
    ports:
      - '5000:5000'
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c 'pip install mlflow==2.13.0 &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlruns'
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: forex-dashboard
    ports:
      - '8501:8501'
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
