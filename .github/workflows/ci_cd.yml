name: Forex Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4
          pip install pandas==2.2.2
          pip install pyarrow==15.0.2
          pip install scikit-learn==1.4.2
          pip install lightgbm==4.3.0
          pip install xgboost==2.0.3
          pip install optuna==3.6.1
          pip install mlflow==2.13.0
          pip install loguru==0.7.2
          pip install pyyaml==6.0.1
          pip install python-dotenv==1.0.1
          pip install pytest==8.2.0
          pip install pytest-cov==5.0.0
          pip install setuptools

      - name: Install project
        run: pip install -e .

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing

  sharpe-gate:
    name: Sharpe Ratio Gate
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4
          pip install pandas==2.2.2
          pip install pyarrow==15.0.2
          pip install scikit-learn==1.4.2
          pip install lightgbm==4.3.0
          pip install xgboost==2.0.3
          pip install optuna==3.6.1
          pip install mlflow==2.13.0
          pip install loguru==0.7.2
          pip install pyyaml==6.0.1
          pip install python-dotenv==1.0.1
          pip install setuptools

      - name: Install project
        run: pip install -e .

      - name: Run Sharpe Gate
        run: |
          python -m src.utils.model_registry --ticker EURUSD
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: logs/backtest_*.json
